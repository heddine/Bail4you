name: Build PWA Android

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "io.github.heddine.bail4you",
            "host": "heddine.github.io",
            "name": "BailExpert",
            "launcherName": "BailExpert",
            "display": "standalone",
            "themeColor": "#ff6600",
            "navigationColor": "#ff6600",
            "backgroundColor": "#ffffff",
            "startUrl": "/Bail4you/",
            "iconUrl": "https://heddine.github.io/Bail4you/icon-512-2.png",
            "maskableIconUrl": "https://heddine.github.io/Bail4you/icon-512-2.png",
            "appVersion": "1.0.0",
            "signingKey": { "path": "android.keystore", "alias": "android" },
            "splashScreenFadeOutDuration": 300,
            "enableNotifications": false,
            "shortcuts": []
          }
          EOF

      - name: Build APK
        run: bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BailExpert-Android
          path: "*.apk"
