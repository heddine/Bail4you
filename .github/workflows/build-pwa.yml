name: Build PWA Android

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install PWABuilder CLI
        run: npm install -g @pwabuilder/cli

      - name: Build Android package
        run: pwabuilder package -p android -u https://heddine.github.io/BailExpert/

      - name: Upload AAB
        uses: actions/upload-artifact@v3
        with:
          name: BailExpert-Android
          path: "**/*.aab"
